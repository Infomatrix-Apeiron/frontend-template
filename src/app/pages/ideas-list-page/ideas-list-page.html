<div class="h-screen flex flex-col bg-white p-6">

    @if (loading$ | async) {

        <div class="h-screen flex items-center justify-center">
            <p-progress-spinner
                    strokeWidth="8"
                    fill="transparent"
                    animationDuration=".5s"
                    [style]="{ width: '60px', height: '60px' }">
            </p-progress-spinner>
        </div>

    } @else {

        <div class="mb-6 text-center">
            <h1 class="text-2xl font-bold">
                Що ми можемо зробити
            </h1>

            <p class="text-gray-500 text-sm mt-1">
                Обери ідею яка тобі найбільше подобається
            </p>
        </div>

        <div class="flex flex-col gap-4 overflow-auto">

            @for (idea of ideas; track idea; let i = $index) {

                <div
                        (click)="selectIdea(idea)"
                        class="flex gap-4 p-4 rounded-2xl border border-gray-200 bg-white shadow-sm hover:shadow-md transition cursor-pointer">

                    <!-- number -->
                    <div
                            class="flex items-center justify-center w-10 h-10 rounded-full bg-gray-100 text-gray-700 font-semibold shrink-0">
                        {{ i + 1 }}
                    </div>

                    <!-- content -->
                    <div class="flex flex-col">
                        <div class="font-semibold text-lg leading-tight">
                            {{ idea.title }}
                        </div>

                        <div class="text-gray-500 text-sm mt-1 leading-relaxed">
                            {{ idea.description }}
                        </div>
                    </div>

                </div>

            }

        </div>

    }

</div>
