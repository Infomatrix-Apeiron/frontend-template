<div class="h-screen flex items-center justify-center bg-white p-4">
    <p-button
            label="Завантажити фото"
            icon="pi pi-camera"
            (click)="fileInput.click()">
    </p-button>

    <input
        #fileInput
        type="file"
        accept="image/*"
        capture="environment"
        class="hidden"
        (change)="onFileSelected($event)">
</div>
