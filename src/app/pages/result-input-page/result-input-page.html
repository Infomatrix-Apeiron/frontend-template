<div class="h-screen flex flex-col bg-white p-4">

    <div class="flex-1 min-h-0">
        <div class="h-full w-full overflow-hidden rounded-3xl border border-gray-200 bg-gray-100">
            <div class="flex h-full w-full items-center justify-center text-gray-400">
                Camera preview
            </div>
        </div>
    </div>

    <div class="pt-4">
        <div class="flex gap-3">

            <div class="flex-1">
                <p-button
                        label="Додати фото"
                        icon="pi pi-image"
                        styleClass="w-full"
                        (click)="fileInput.click()">
                </p-button>
            </div>

            <div class="flex-1">
                <p-button
                        label="Відправити"
                        icon="pi pi-send"
                        styleClass="w-full"
                        severity="contrast"
                        (click)="submit()">
                </p-button>
            </div>

        </div>
    </div>

    <input
        #fileInput
        type="file"
        accept="image/*"
        capture="environment"
        class="hidden"
        (change)="onFileSelected($event)">
</div>
