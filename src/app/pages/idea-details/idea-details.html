<div class="h-screen flex flex-col bg-white p-6">

    @if (loading$ | async) {

        <div class="flex-1 flex flex-col items-center justify-center gap-4">
            <p-progress-spinner
                    strokeWidth="8"
                    fill="transparent"
                    animationDuration=".5s"
                    [style]="{ width: '60px', height: '60px' }">
            </p-progress-spinner>

            <div class="text-gray-500 text-sm">
                Генеруємо інструкцію...
            </div>
        </div>

    } @else {

        <div class="flex-1 overflow-y-auto">

            <!-- Header -->
            <div class="mb-6 text-center">
                <h1 class="text-2xl font-bold">
                    {{ idea?.title }}
                </h1>

                <p class="text-gray-500 text-sm mt-2">
                    {{ idea?.description }}
                </p>
            </div>

            <!-- Steps -->
            <div class="flex flex-col gap-6">

                @for (step of idea?.steps; track step.step; let i = $index) {

                    <div class="flex flex-col gap-3">

                        <!-- Step header -->
                        <div class="flex items-center gap-3">

                            <div
                                    class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-100 text-sm font-semibold">
                                {{ i + 1 }}
                            </div>

                            <div class="font-semibold">
                                {{ step.title }}
                            </div>

                        </div>

                        <!-- Image -->
                        <div class="w-full rounded-xl overflow-hidden border border-gray-200 bg-gray-50">
                            <img
                                    [src]="step.image"
                                    class="w-full object-contain" alt="">
                        </div>

                        <!-- Description -->
                        <div class="text-sm text-gray-600 leading-relaxed">
                            {{ step.description }}
                        </div>

                    </div>

                }

            </div>

        </div>

        <!-- Bottom button -->
        <div class="pt-4">
            <p-button
                    label="Подивись, що у мене вийшло"
                    icon="pi pi-camera"
                    styleClass="w-full h-12"
                    severity="contrast"
                    (click)="showResult()">
            </p-button>
        </div>

    }

</div>
