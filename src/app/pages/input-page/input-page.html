<div class="h-screen flex flex-col items-center justify-center p-4" style="padding-bottom: 120px">
    <img ngSrc="assets/chickens.svg" alt="" height="322" width="322"/>

    <p-button
            label="Завантажити фото"
            icon="pi pi-camera"
            (click)="fileInput.click()">
    </p-button>

    <input
        #fileInput
        type="file"
        accept="image/*"
        capture="environment"
        class="hidden"
        (change)="onFileSelected($event)">
</div>
